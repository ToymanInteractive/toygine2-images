name: Build Docker images

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile.gba
      - .github/workflows/docker_build.yaml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    concurrency:
      group: docker-build-${{ matrix.image }}
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: gba

    name: ${{ matrix.image }}
    runs-on: ubuntu-26.04
    # arm64 is built under QEMU emulation (mGBA is compiled from source),
    # which is much slower than native; allow extra time for cold builds.
    timeout-minutes: 120
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.1.0
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ghcr.io/toymaninteractive/toygine2.${{ matrix.image }}.toolchain
          tags: |
            type=raw,value=latest
            type=raw,value={{date 'YYYYMMDD'}}

      - name: Build only
        if: ${{ github.ref != 'refs/heads/main' }}
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: Dockerfile.${{ matrix.image }}
          platforms: linux/amd64,linux/arm64
          push: false
          cache-from: type=registry,ref=ghcr.io/toymaninteractive/toygine2.${{ matrix.image }}.toolchain:buildcache

      - name: Build and push
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: Dockerfile.${{ matrix.image }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/toymaninteractive/toygine2.${{ matrix.image }}.toolchain:buildcache
          cache-to: type=registry,ref=ghcr.io/toymaninteractive/toygine2.${{ matrix.image }}.toolchain:buildcache,mode=max
