name: Build Docker images

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/docker_build.yaml
      - Dockerfile.3ds
      - Dockerfile.gba
      - Dockerfile.gc
      - Dockerfile.genesis
      - Dockerfile.nds
      - Dockerfile.switch
      - Dockerfile.wii
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/docker_build.yaml
      - Dockerfile.3ds
      - Dockerfile.gba
      - Dockerfile.gc
      - Dockerfile.genesis
      - Dockerfile.nds
      - Dockerfile.switch
      - Dockerfile.wii
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    concurrency:
      group: docker-build-${{ matrix.image }}-${{ github.ref }}
      # Never cancel an in-flight publish on main; supersede stale PR builds.
      cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: 3ds
          - image: gba
          - image: gc
          - image: genesis
          - image: nds
          - image: switch
          - image: wii

    name: ${{ matrix.image }}
    runs-on: ubuntu-26.04
    # arm64 is built under QEMU emulation (mGBA is compiled from source),
    # which is much slower than native; allow extra time for cold builds.
    timeout-minutes: 120
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.1.0
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to GHCR
        # Forked-PR runs have no access to secrets; skip login there (cache reads may miss, but the build still validates). Always logs in for push/dispatch.
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ghcr.io/toymaninteractive/toygine2.${{ matrix.image }}.toolchain
          tags: |
            type=raw,value=latest
            type=raw,value={{date 'YYYYMMDD'}}

      - name: Build only
        if: ${{ github.ref != 'refs/heads/main' }}
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: Dockerfile.${{ matrix.image }}
          platforms: linux/amd64,linux/arm64
          # Provenance disabled: multi-platform attestations may cause compatibility issues with some registries and runtimes (see docker/build-push-action#781)
          provenance: false
          push: false
          cache-from: type=registry,ref=ghcr.io/toymaninteractive/toygine2.${{ matrix.image }}.toolchain:buildcache

      - name: Build and push
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: Dockerfile.${{ matrix.image }}
          platforms: linux/amd64,linux/arm64
          provenance: false
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/toymaninteractive/toygine2.${{ matrix.image }}.toolchain:buildcache
          cache-to: type=registry,ref=ghcr.io/toymaninteractive/toygine2.${{ matrix.image }}.toolchain:buildcache,mode=max
